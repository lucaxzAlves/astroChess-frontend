<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Astro Chess Great move badge">
  <defs>
    <radialGradient id="bg" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#8b5cf6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#070712" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="ring" x1="18" y1="10" x2="110" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.20
                0 0 0 0 1.00
                0 0 0 0.85 0" result="purpleGlow"/>
      <feMerge>
        <feMergeNode in="purpleGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- meteor trail -->
  <path d="M16 78 C36 60, 52 44, 82 18" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.16"/>
  <path d="M9 91 C35 72, 60 52, 103 25" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.22"/>

  <!-- badge -->
  <circle cx="64" cy="64" r="47" fill="url(#bg)" stroke="url(#ring)" stroke-width="4" filter="url(#softShadow)"/>
  <circle cx="64" cy="64" r="38" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
  <path d="M37 33 C50 22, 77 20, 94 41" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.18"/>

  <!-- tiny stars -->
  <circle cx="31" cy="48" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="94" cy="38" r="1.8" fill="#ffffff" opacity="0.75"/>
  <circle cx="92" cy="87" r="2.2" fill="#3b82f6" opacity="0.8"/>
  <path d="M28 82 l3 0 m-1.5 -1.5 l0 3" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M101 62 l4 0 m-2 -2 l0 4" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

  <!-- symbol -->
  <text x="64" y="78" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif"
        font-size="54"
        font-weight="900"
        fill="#ffffff"
        stroke="#11111b"
        stroke-width="3"
        paint-order="stroke"
        filter="url(#glow)">!</text>
</svg>