<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Astro Chess Great move badge">
  <defs>
    <radialGradient id="bg" cx="34%" cy="24%" r="78%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.96"/>
      <stop offset="42%" stop-color="#2563eb" stop-opacity="0.94"/>
      <stop offset="72%" stop-color="#4c1d95" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#070712" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="ring" x1="18" y1="11" x2="111" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.96"/>
      <stop offset="46%" stop-color="#38bdf8" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="bolt" x1="42" y1="18" x2="82" y2="101" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="36%" stop-color="#bae6fd"/>
      <stop offset="72%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="trail" x1="18" y1="90" x2="92" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="45%" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.12
                0 0 0 0 0.76
                0 0 0 0 0.96
                0 0 0 0.9 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.52"/>
    </filter>
  </defs>

  <path d="M11 91 C33 78, 51 61, 78 25" fill="none" stroke="url(#trail)" stroke-width="8" stroke-linecap="round"/>
  <path d="M20 101 C42 82, 58 64, 99 32" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>

  <circle cx="64" cy="64" r="47" fill="url(#bg)" stroke="url(#ring)" stroke-width="4" filter="url(#softShadow)"/>
  <circle cx="64" cy="64" r="39" fill="none" stroke="#e0f2fe" stroke-opacity="0.12" stroke-width="2"/>
  <path d="M36 34 C51 23, 77 22, 94 42" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.16"/>

  <circle cx="30" cy="47" r="2" fill="#ffffff" opacity="0.88"/>
  <circle cx="95" cy="39" r="1.8" fill="#bae6fd" opacity="0.82"/>
  <circle cx="96" cy="88" r="2.2" fill="#38bdf8" opacity="0.85"/>
  <path d="M28 82 l3 0 m-1.5 -1.5 l0 3" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.72"/>
  <path d="M101 63 l4 0 m-2 -2 l0 4" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round" opacity="0.86"/>

  <g filter="url(#glow)">
    <path
      d="M70 18 42 65h19l-8 46 36-58H66l4-35Z"
      fill="url(#bolt)"
      stroke="#0f172a"
      stroke-width="4"
      stroke-linejoin="round"
      paint-order="stroke"
    />
    <path
      d="M69 28 51 60h17l-5 27 22-37H63l6-22Z"
      fill="#ffffff"
      opacity="0.2"
    />
  </g>
</svg>
